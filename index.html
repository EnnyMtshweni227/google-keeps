<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratch — Quick Notes</title>
    <meta
      name="description"
      content="Scratch is a fast, distraction-free notes app for jotting things down, pinning what matters, and archiving the rest."
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to notes</a>

    <div class="app-shell">
      <!-- ============ The SIDEBAR ============ -->
      <aside class="sidebar" id="sidebar" aria-label="Primary">
        <button
          id="menuToggle"
          class="icon-btn menu-toggle"
          type="button"
          data-tooltip="Toggle menu"
          aria-expanded="true"
          aria-controls="sidebar"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>

        <nav class="sidebar-nav" aria-label="Views">
          <button class="nav-item is-active" type="button" data-view="notes">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
              <path d="M14 3v5h5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
              <path d="M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <span>Notes</span>
          </button>

          <button class="nav-item" type="button" data-view="archive">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="4" width="18" height="4.5" rx="1" stroke="currentColor" stroke-width="1.6" />
              <path d="M4.5 8.5V19a1 1 0 0 0 1 1h13a1 1 0 0 0 1-1V8.5" stroke="currentColor" stroke-width="1.6" />
              <path d="M10 13h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <span>Archive</span>
          </button>

          <button class="nav-item" type="button" data-view="bin">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              <path d="M9 7V4.8A1.8 1.8 0 0 1 10.8 3h2.4A1.8 1.8 0 0 1 15 4.8V7" stroke="currentColor" stroke-width="1.6" />
              <path d="M6.5 7 7.3 19.2A1.8 1.8 0 0 0 9.1 21h5.8a1.8 1.8 0 0 0 1.8-1.8L17.5 7" stroke="currentColor" stroke-width="1.6" />
              <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <span>Trash</span>
          </button>
        </nav>

        <p class="sidebar-footnote">Notes are saved on this device.</p>
      </aside>

      <!-- ============ MAIN ============ -->
      <div class="main-content">
        <header class="app-header">
          <div class="brand">
            <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M6 26 24 8" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" />
              <path d="M20 8h5v5" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <h1>Scratch</h1>
          </div>

          <div class="search-wrapper" role="search">
            <svg viewBox="0 0 24 24" fill="none" class="search-icon" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
              <path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            <label for="searchInput" class="visually-hidden">Search notes</label>
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="Search your notes"
              autocomplete="off"
            />
          </div>

          <div class="header-actions">
            <button
              id="viewToggle"
              class="icon-btn"
              type="button"
              data-tooltip="Switch to list view"
              aria-pressed="false"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3.5" y="3.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" />
                <rect x="13.5" y="3.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" />
                <rect x="3.5" y="13.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" />
                <rect x="13.5" y="13.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" />
              </svg>
            </button>
            <div class="avatar" title="Guest account" aria-hidden="true">G</div>
          </div>
        </header>

        <main id="main-content" class="notes-workspace">
          <!-- Composer -->
          <section class="composer-section" aria-label="Create a note">
            <form id="composerForm" class="composer" data-expanded="false">
              <input
                id="composerTitle"
                class="composer-title"
                type="text"
                name="title"
                placeholder="Title"
                maxlength="100"
                autocomplete="off"
              />
              <textarea
                id="composerText"
                class="composer-text"
                name="text"
                placeholder="Jot something down…"
                maxlength="2000"
                rows="1"
              ></textarea>

              <div class="composer-footer">
                <div class="swatch-row" id="composerSwatches" role="radiogroup" aria-label="Note colour"></div>

                <div class="composer-buttons">
                  <button
                    type="button"
                    id="composerPin"
                    class="icon-btn"
                    data-tooltip="Pin this note"
                    aria-pressed="false"
                  >
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M13.5 3.5 20.5 10.5 17 14l-1 6-3-5-5 5 5-5-5-3 6-1 3.5-3.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                    </svg>
                  </button>
                  <button type="button" id="composerCancel" class="btn-text">Close</button>
                  <button type="submit" class="btn-solid">Save</button>
                </div>
              </div>
            </form>
          </section>

          <!-- Bin toolbar -->
          <div id="binTools" class="bin-tools hidden">
            <p>Notes in Trash are removed automatically after they're deleted forever.</p>
            <button id="emptyBinBtn" class="btn-text" type="button">Empty Trash</button>
          </div>

          <!-- Empty state -->
          <div id="emptyState" class="empty-state hidden">
            <svg viewBox="0 0 120 96" class="empty-illustration" aria-hidden="true">
              <path d="M20 20h60l20 20v40a4 4 0 0 1-4 4H20a4 4 0 0 1-4-4V24a4 4 0 0 1 4-4Z" stroke="currentColor" stroke-width="2.5" fill="none" />
              <path d="M80 20v20h20" stroke="currentColor" stroke-width="2.5" fill="none" />
              <path d="M32 48h32M32 60h20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            </svg>
            <p id="emptyStateText">Nothing here yet — start with a note above.</p>
          </div>

          <!-- Notes grid -->
          <section aria-label="Your notes">
            <ul id="notesList" class="notes-grid" aria-live="polite"></ul>
          </section>
        </main>
      </div>
    </div>

    <!-- ============ EDIT MODAL ============ -->
    <div id="noteModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-card">
        <h2 id="modalTitle" class="visually-hidden">Edit note</h2>
        <form id="editForm">
          <input
            id="editTitle"
            name="title"
            type="text"
            placeholder="Title"
            maxlength="100"
            autocomplete="off"
          />
          <textarea
            id="editText"
            name="text"
            placeholder="Write something…"
            maxlength="2000"
            rows="8"
          ></textarea>

          <div class="modal-footer">
            <div class="swatch-row" id="editSwatches" role="radiogroup" aria-label="Note colour"></div>

            <div class="modal-actions">
              <button
                type="button"
                id="editPin"
                class="icon-btn"
                data-tooltip="Pin this note"
                aria-pressed="false"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M13.5 3.5 20.5 10.5 17 14l-1 6-3-5-5 5 5-5-5-3 6-1 3.5-3.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                </svg>
              </button>
              <span class="modal-timestamp" id="modalTimestamp"></span>
              <div class="modal-actions-right">
                <button type="button" id="cancelEdit" class="btn-text">Close</button>
                <button type="submit" class="btn-solid">Save</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- ============ TOAST ============ -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite">
      <span id="toastMessage"></span>
      <button id="toastAction" class="toast-action" type="button" hidden>Undo</button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>

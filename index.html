<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Keep clone</title>
  <!-- Font Awesome for real Google Keep icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="keep-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="menu-icon" id="sidebarMenuToggle" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/></svg>
        </button>
        <div class="logo">
          <i class="fas fa-keep"></i>
          <span>Keep</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="Views">
        <button class="side-link is-active" data-section="notes">
          <svg viewBox="0 0 24 24"><path d="M7 3h8l4 4v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span>Notes</span>
        </button>
        <button class="side-link" data-section="reminders">
          <svg viewBox="0 0 24 24"><path d="M12 3a5 5 0 0 0-5 5v3.2c0 .5-.2 1-.5 1.4L5 15h14l-1.5-2.4a2.2 2.2 0 0 1-.5-1.4V8a5 5 0 0 0-5-5Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M10 18a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span>Reminders</span>
        </button>
        <button class="side-link" data-section="labels">
          <svg viewBox="0 0 24 24"><path d="m5 19 1-4L17 4l3 3L9 18l-4 1Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/></svg>
          <span>Edit labels</span>
        </button>
        <button class="side-link" data-section="archive">
          <svg viewBox="0 0 24 24"><rect x="3.5" y="4" width="17" height="4" rx="1" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M10 12.5h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span>Archive</span>
        </button>
        <button class="side-link" data-section="bin">
          <svg viewBox="0 0 24 24"><path d="M4 7h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9 7V4.8A1.8 1.8 0 0 1 10.8 3h2.4A1.8 1.8 0 0 1 15 4.8V7" stroke="currentColor" stroke-width="1.6"/><path d="M6.5 7l.8 12.2A1.8 1.8 0 0 0 9.1 21h5.8a1.8 1.8 0 0 0 1.8-1.8L17.5 7" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          <span>Bin</span>
        </button>
      </nav>
      <div class="sidebar-footer">Open-source licences</div>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel">
      <!-- top bar -->
      <header class="top-bar">
        <div class="brand">
          <i class="fas fa-keep"></i>
          <span id="brandText">Keep</span>
        </div>
        <div class="search-wrapper">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input id="searchInput" type="search" placeholder="Search notes" autocomplete="off" />
        </div>
        <div class="top-actions">
          <button id="refreshButton" data-tooltip="Refresh">
            <svg viewBox="0 0 24 24"><path d="M4 10a8 8 0 1 1 2.34 5.66" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M4 4v6h6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
          <button id="layoutToggle" data-tooltip="List view">
            <svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" fill="none"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" fill="none"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" fill="none"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          </button>
          <button data-tooltip="Settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M12 3.5v2.2M12 18.3v2.2M20.5 12h-2.2M5.7 12H3.5M17.7 6.3l-1.55 1.55M7.85 16.15 6.3 17.7M17.7 17.7l-1.55-1.55M7.85 7.85 6.3 6.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
          <button data-tooltip="Apps">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="6" r="1.8"/><circle cx="12" cy="6" r="1.8"/><circle cx="18" cy="6" r="1.8"/><circle cx="6" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="18" cy="12" r="1.8"/><circle cx="6" cy="18" r="1.8"/><circle cx="12" cy="18" r="1.8"/><circle cx="18" cy="18" r="1.8"/></svg>
          </button>
          <div class="avatar">J</div>
        </div>
      </header>

      <!-- composer -->
      <section class="composer-section">
        <div class="composer-box">
          <input id="composerInput" type="text" placeholder="Take a note…" readonly />
          <button id="newNoteBtn" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
      </section>

      <p id="binNotice" class="bin-notice hidden">Items in the Bin can be restored or removed for good.</p>

      <!-- notes container -->
      <section class="notes-container">
        <div id="notesList" class="notes-grid" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <!-- MODAL -->
  <div id="noteModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h3 id="modalTitle">New note</h3>
      <form id="noteForm">
        <input id="noteTitle" name="title" type="text" placeholder="Title" maxlength="100" autocomplete="off" />
        <textarea id="noteText" name="text" placeholder="Write something…" maxlength="2000"></textarea>
        <div class="modal-footer">
          <span id="modalTimestamp" class="modal-timestamp"></span>
          <div class="modal-actions">
            <button id="cancelNote" class="btn-text" type="button">Close</button>
            <button class="btn-save" type="submit">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
